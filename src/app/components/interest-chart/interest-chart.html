<div class="chart-card">
  <div class="chart-card__header">
    <h3 class="chart-card__title">Evolución por año</h3>
    <div class="toggle">
      <button
        type="button"
        class="toggle__option"
        [class.toggle__option--active]="chartMode() === 'bar'"
        (click)="setChartMode('bar')"
      >
        Barras
      </button>
      <button
        type="button"
        class="toggle__option"
        [class.toggle__option--active]="chartMode() === 'line'"
        (click)="setChartMode('line')"
      >
        Líneas
      </button>
    </div>
  </div>

  <span class="chart-card__hint">Desliza para ver todos los años →</span>

  <div class="chart-card__scroll">
    <div class="chart-card__canvas-wrap" [style.min-width.px]="minChartWidth()">
      <canvas #chartCanvas></canvas>
    </div>
  </div>
</div>
